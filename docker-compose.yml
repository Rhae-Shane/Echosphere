services:
  db:
    image: postgres:16
    container_name: echosphere-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: echosphere-redis
    ports:
      - "6379:6379"

  app:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: echosphere-backend
    depends_on:
      - db
      - redis
    env_file:
      - .env
    ports:
      - "5000:5000"
    restart: unless-stopped

volumes:
  pg_data:
