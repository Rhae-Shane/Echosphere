services:
  db:
    image: postgres:16
    container_name: echosphere-postgres
    environment:
      POSTGRES_USER: echosphere
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: echosphere_db
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: echosphere-redis
    ports:
      - "6379:6379"

  app:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: echosphere-backend
    depends_on:
      - db
      - redis
    environment:
      NODE_ENV: production
      PORT: 5000

      JWT_SECRET: "mysupersecretkey1234567890!@#"
      FRONTEND_URL: "http://localhost:5173"

      DATABASE_URL: "postgresql://echosphere:password123@db:5432/echosphere_db?schema=public"
      REDIS_URL: "redis://redis:6379"
      GEMINI_API_KEY: "AIzaSyDTztubfHPs9sZ8igCLCdOg4C9AUsFZ-a4"
      GEMINI_MODEL: "gemini-2.5-flash"
      OMNIDIM_API_KEY: "cISORi5wkL-n7vmGf4cwXnpQMwo7mFC3ZGIdlgy9YXI"
      OMNIDIM_AGENT_ID: "8982"

    ports:
      - "5000:5000"
    restart: unless-stopped

volumes:
  pg_data:
